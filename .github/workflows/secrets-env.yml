name: Secrets and Environment Variables

on:
  push:
    branches: [master]

  workflow_dispatch:

env:
  NODE_ENV: production
  APP_NAME: My Application

jobs:

  env-vars:
    name: Environment Variables Demo
    runs-on: ubuntu-latest

    env:
      JOB_SPECIFIC_VAR: "This is job-specific"
      BUILD_NUMBER: ${{ github.run_number }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Display environment variables
        run: |
          echo "Global env vars:"
          echo "NODE_ENV: ${{ env.NODE_ENV }}"
          echo "APP_NAME: ${{ env.APP_NAME }}"

          echo ""

          echo "Job-specific env vars:"
          echo "JOB_SPECIFIC_VAR: ${{ env.JOB_SPECIFIC_VAR }}"
          echo "BUILD_NUMBER: ${{ env.BUILD_NUMBER }}"

          echo ""

          echo "GitHub context variables:"
          echo "Repository: ${{ github.repository }}"
          echo "Actor: ${{ github.actor }}"
          echo "SHA: ${{ github.sha }}"
          echo "Ref: ${{ github.ref }}"

      - name: Use environment variable in script
        env:
          STEP_SPECIFIC_VAR: "This is step-specific"

        run: |
          echo "Step-specific var: $STEP_SPECIFIC_VAR"

          export MY_VAR="test"

          echo "Exported var: $MY_VAR"

  secrets-demo:
    name: Secrets Demo
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use secrets
        env:
          API_KEY: ${{ secrets.API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}

        run: |
          echo "API Key is set: $([ -n "$API_KEY" ] && echo 'Yes' || echo 'No')"

          echo "Database URL is set: $([ -n "$DATABASE_URL" ] && echo 'Yes' || echo 'No')"

          echo "Deploy token is set: $([ -n "$DEPLOY_TOKEN" ] && echo 'Yes' || echo 'No')"

      - name: Use secret in command
        run: |
          curl -H "Authorization: Bearer ${{ secrets.API_KEY }}" \
          https://api.example.com/data || echo "API call failed"

  environments-demo:
    name: Environments Demo
    runs-on: ubuntu-latest

    environment:
      name: staging
      url: https://staging.example.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Display environment info
        run: |
          echo "Environment: staging"
          echo "Environment URL: https://staging.example.com"

      - name: Use environment secret
        env:
          ENV_API_KEY: ${{ secrets.ENV_API_KEY }}

        run: |
          echo "Environment secret is set: $([ -n "$ENV_API_KEY" ] && echo 'Yes' || echo 'No')"

  conditional-secrets:
    name: Conditional Secrets
    runs-on: ubuntu-latest

    if: github.ref == 'refs/heads/master'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to production
        env:
          PROD_TOKEN: ${{ secrets.PRODUCTION_DEPLOY_TOKEN }}

        run: |
          echo "Deploying to production..."

          echo "Deployment token status: $([ -n "$PROD_TOKEN" ] && echo 'Token is set' || echo 'Token missing')"